# H2 Configuration (Active)
spring.datasource.url=jdbc:h2:file:./data/security_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ensure dates are serialized as ISO strings
spring.jackson.serialization.write-dates-as-timestamps=false

# Allow CORS for frontend
server.port=${PORT:8080}
server.address=0.0.0.0

apds.cors.allowedOrigins=http://localhost:5173,http://127.0.0.1:5173
apds.cors.allowedOriginPatterns=http://localhost:5173,http://127.0.0.1:5173,http://192.168.*.*:5173,http://10.*.*.*:5173
apds.proxy.upstreamBase=https://example.com

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
